name: Nightly SemiPulse report

"on":
  workflow_dispatch: {}
  schedule:
    - cron: "0 18 * * *"
      timezone: "America/New_York"

permissions:
  contents: read

concurrency:
  group: semipulse-pages
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "0"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  MPLBACKEND: Agg
  TZ: America/New_York

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11.15"

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Install project
        run: python -m pip install --no-deps --no-build-isolation .

      - name: Verify workflow
        run: python scripts/verify_workflow.py .github/workflows/nightly-report.yml

      - name: Run offline tests
        run: python -m pytest -q

      - name: Build report
        run: >-
          python -m semipulse_sentinel build --watchlist config/watchlist.csv --output site --json

      - name: Validate site
        run: python -m semipulse_sentinel validate --site site --json

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: github-pages
          path: site
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
